<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Sameer Varshney — Full Stack Developer</title>

  <defs>
    <style>
      .hero-name {
        font: 700 56px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        fill: #F8FAFC;
      }

      .hero-role {
        font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        fill: #94A3B8;
      }

      .hero-edu {
        font: 400 17px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        fill: #94A3B8;
      }

      .typing {
        font: 500 18px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        fill: #3B82F6;
        opacity: 0;
        animation: cycle 16s infinite;
      }

      .typing:nth-of-type(1) { animation-delay: 0s; }
      .typing:nth-of-type(2) { animation-delay: 4s; }
      .typing:nth-of-type(3) { animation-delay: 8s; }
      .typing:nth-of-type(4) { animation-delay: 12s; }

      .tagline {
        font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        fill: #94A3B8;
        letter-spacing: 6px;
        text-transform: uppercase;
      }

      @keyframes cycle {
        0%       { opacity: 0; }
        3%, 21%  { opacity: 1; }
        25%, 100%{ opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .typing { animation: none; opacity: 0; }
        .typing:first-of-type { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Flat background -->
  <rect width="1200" height="380" fill="#0D1117" />

  <!-- Name -->
  <text class="hero-name" x="600" y="120" text-anchor="middle">Sameer Varshney</text>

  <!-- Role -->
  <text class="hero-role" x="600" y="160" text-anchor="middle">Full Stack Developer</text>

  <!-- Education -->
  <text class="hero-edu" x="600" y="192" text-anchor="middle">Mathematics &amp; Computing @ NIT Hamirpur</text>

  <!-- Animated typing lines -->
  <g>
    <text class="typing" x="600" y="250" text-anchor="middle">Full Stack Developer</text>
    <text class="typing" x="600" y="250" text-anchor="middle">Data Structures & Algorithms Enthusiast</text>
    <text class="typing" x="600" y="250" text-anchor="middle">Backend Engineering Enthusiast</text>
    <text class="typing" x="600" y="250" text-anchor="middle">Building Scalable Web Applications</text>
  </g>

  <!-- Tagline -->
  <text class="tagline" x="600" y="330" text-anchor="middle">Code  •  Learn  •  Build  •  Repeat</text>
</svg>
